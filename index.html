<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save the Date</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Great+Vibes&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a0f0a;
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
  }

  .invitation-card {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .bg-image {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(15, 8, 4, 0.55) 0%,
      rgba(15, 8, 4, 0.15) 30%,
      rgba(15, 8, 4, 0.15) 55%,
      rgba(15, 8, 4, 0.7) 85%,
      rgba(15, 8, 4, 0.92) 100%
    );
    z-index: 1;
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    height: 100%;
    width: 100%;
    padding: 40px 20px 50px;
    text-align: center;
    color: #fef3e2;
  }

  .top-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    animation: fadeDown 1.5s ease-out;
  }

  .divider-line {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #d4a574, transparent);
    margin: 4px 0;
  }

  .save-the {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: #e8cba8;
    opacity: 0.9;
  }

  .date-script {
    font-family: 'Great Vibes', cursive;
    font-size: 52px;
    color: #f5dfc0;
    line-height: 1;
    text-shadow: 0 2px 20px rgba(180, 140, 90, 0.4);
  }

  .bottom-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    animation: fadeUp 1.8s ease-out;
  }

  .wedding-date {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 3px;
    text-shadow: 0 3px 25px rgba(0,0,0,0.5);
    line-height: 1.1;
  }

  .wedding-date .month-year {
    display: block;
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 10px;
    color: #e8cba8;
    margin-top: 4px;
  }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 300;
    font-style: italic;
    color: #d4a574;
    letter-spacing: 3px;
    opacity: 0.85;
  }

  .ornament {
    font-size: 22px;
    color: #d4a574;
    opacity: 0.6;
    letter-spacing: 12px;
  }

  .blessings-btn {
    margin-top: 10px;
    padding: 14px 44px;
    border: 1.5px solid #d4a574;
    background: rgba(180, 130, 80, 0.15);
    color: #f5dfc0;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 5px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 50px;
    transition: all 0.4s ease;
    backdrop-filter: blur(6px);
    position: relative;
    overflow: visible;
  }

  .blessings-btn:hover {
    background: rgba(212, 165, 116, 0.3);
    box-shadow: 0 0 30px rgba(212, 165, 116, 0.25);
    transform: scale(1.04);
  }

  .blessings-btn:active {
    transform: scale(0.97);
  }

  /* Heart emoji animations */
  .heart-float {
    position: fixed;
    font-size: 26px;
    pointer-events: none;
    z-index: 100;
    animation: floatUp var(--duration) ease-out forwards;
    opacity: 0;
  }

  @keyframes floatUp {
    0% {
      opacity: 1;
      transform: translateY(0) scale(0.4) rotate(0deg);
    }
    20% {
      opacity: 1;
      transform: translateY(-40px) scale(1.1) rotate(-10deg);
    }
    60% {
      opacity: 0.8;
      transform: translateY(-160px) scale(1) rotate(15deg);
    }
    100% {
      opacity: 0;
      transform: translateY(-340px) scale(0.6) rotate(-5deg);
    }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Sparkle particles */
  .sparkle-container {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }

  .sparkle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: #f5dfc0;
    border-radius: 50%;
    opacity: 0;
    animation: sparkle 3s infinite;
  }

  @keyframes sparkle {
    0%, 100% { opacity: 0; transform: scale(0); }
    50% { opacity: 0.7; transform: scale(1); }
  }
</style>
</head>
<body>

<div class="invitation-card">
  <img class="bg-image" id="bgImg" alt="Wedding Photo" />

  <div class="overlay"></div>

  <div class="sparkle-container" id="sparkles"></div>

  <div class="content">
    <div class="top-section">
      <div class="divider-line"></div>
      <div class="save-the">Save the</div>
      <div class="date-script">Date</div>
      <div class="divider-line"></div>
    </div>

    <div class="bottom-section">
      <div class="ornament">✦ ✦ ✦</div>
      <div class="wedding-date">
        10
        <span class="month-year">MAY 2026</span>
      </div>
      <div class="tagline">Together with joy, we begin forever</div>
      <button class="blessings-btn" id="blessBtn" onclick="sendBlessings(event)">
        🤍 Send Blessings
      </button>
    </div>
  </div>
</div>

  // Create ambient sparkles
  const sparkleContainer = document.getElementById('sparkles');
  for (let i = 0; i < 25; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDelay = Math.random() * 3 + 's';
    s.style.animationDuration = (2 + Math.random() * 2) + 's';
    sparkleContainer.appendChild(s);
  }

  const hearts = ['❤️','💖','💕','💗','💓','🤍','💛','🩷','✨','💐'];

  function sendBlessings(e) {
    const btn = e.currentTarget;
    const rect = btn.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top;

    for (let i = 0; i < 8; i++) {
      setTimeout(() => {
        const heart = document.createElement('div');
        heart.className = 'heart-float';
        heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        heart.style.left = (cx + (Math.random() - 0.5) * 120) + 'px';
        heart.style.top = cy + 'px';
        heart.style.setProperty('--duration', (1.5 + Math.random() * 1) + 's');
        heart.style.fontSize = (20 + Math.random() * 18) + 'px';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 2800);
      }, i * 100);
    }
  }
